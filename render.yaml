services:
  # Database Service
  - type: db
    name: ats-resume-db
    databaseName: resume_analyzer
    user: postgres
    plan: free

  # FastAPI Backend Web Service
  - type: web
    name: ats-resume-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    disk:
      name: ats-model-cache
      mountPath: /app/model_cache
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ats-resume-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MODEL_CACHE_DIR
        value: /app/model_cache
      - key: CORS_ORIGINS
        value: "https://your-frontend-vercel-app.vercel.app" # To be replaced with actual Vercel URL
