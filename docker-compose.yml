version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ats_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ats_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/resume_analyzer
      - JWT_SECRET_KEY=dev-super-secret-key-replace-in-production-12345
      - MODEL_CACHE_DIR=/app/model_cache
      - UPLOAD_DIR=/app/uploads
      - CORS_ORIGINS=http://localhost,http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - model_cache:/app/model_cache
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: ats_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  model_cache:
  uploads_data:
