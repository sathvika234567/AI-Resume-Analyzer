# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration scripts
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to copy to slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded
# from the current directory, which is useful when
# importing models to generate migrations
prepend_sys_path = .

# version path separator; as of Alembic 1.3, this defaults to os.pathsep
# version_path_separator = :

# set to 'true' to search for scripts in subdirectories of version_path_separator
# version_locations =

# the database URL
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/resume_analyzer


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# after generating new revision scripts.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
